<div class="login-box">
  <div class="login-header">
    <h2>Super Admin Panel</h2>
  </div>
  <div id="login-error" class="alert alert-error hidden"></div>
  <div class="form-group">
    <label>Usuario (RUT o username)</label>
    <input type="text" id="login-user" placeholder="Ingrese su usuario" />
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="Ingrese su contraseña" />
  </div>
  <div class="form-group">
    <label>Ambiente</label>
    <select id="login-env" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
      <option value="dev">🔵 Desarrollo</option>
      <option value="prod">🔴 Producción</option>
    </select>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
    <input type="checkbox" id="login-remember" />
    <label for="login-remember" style="font-size:13px;color:#6b7280;cursor:pointer;">Recordar datos</label>
  </div>
  <button class="btn btn-primary btn-block" id="login-btn">Iniciar Sesión</button>
  <div style="text-align:center;margin-top:16px;">
    <a href="#/settings" style="color:#6b7280;font-size:13px;text-decoration:none;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#6b7280'">⚙️ Configurar conexión a base de datos</a>
  </div>
</div>
