<div class="card">
  <div class="card-title" style="font-size:18px;margin-bottom:8px;">Enviar Notificación</div>
  <hr style="border:none;border-top:1px solid #e5e7eb;margin-bottom:14px;">
  <p style="margin-bottom:16px;color:#6b7280;font-size:13px;">Envía un mensaje en tiempo real que aparecerá como modal en la pantalla de los usuarios seleccionados.</p>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
    <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px;">
      <label style="font-size:12px;color:#6b7280;font-weight:500;">Destinatario</label>
      <select id="broadcast-target" style="padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
        <option value="admin">👨‍💼 Administradores</option>
        <option value="seller">🏪 Vendedores</option>
        <option value="client">👤 Clientes</option>
        <option value="all">🌐 Todos</option>
      </select>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px;">
      <label style="font-size:12px;color:#6b7280;font-weight:500;">Tipo</label>
      <select id="broadcast-type" style="padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
        <option value="info">ℹ️ Información</option>
        <option value="warning">⚠️ Advertencia</option>
        <option value="success">✅ Éxito</option>
      </select>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px;">
    <label style="font-size:12px;color:#6b7280;font-weight:500;">Título</label>
    <input type="text" id="broadcast-title" placeholder="Ej: Mantenimiento programado" style="padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;" />
  </div>

  <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px;">
    <label style="font-size:12px;color:#6b7280;font-weight:500;">Mensaje</label>
    <textarea id="broadcast-message" rows="4" placeholder="Escribe el mensaje que verán los usuarios..." style="padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;"></textarea>
  </div>

  <hr style="border:none;border-top:1px solid #e5e7eb;margin-bottom:14px;">

  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn btn-primary" onclick="BroadcastPage.send()">📢 Enviar Notificación</button>
    <span id="broadcast-status" style="font-size:13px;color:#6b7280;"></span>
  </div>
</div>

<div class="card" style="margin-top:16px;">
  <div class="card-title" style="font-size:18px;margin-bottom:8px;">Vista Previa</div>
  <hr style="border:none;border-top:1px solid #e5e7eb;margin-bottom:14px;">
  <div id="broadcast-preview" style="display:flex;align-items:center;justify-content:center;min-height:200px;background:#f9fafb;border-radius:8px;border:2px dashed #e5e7eb;">
    <p style="color:#9ca3af;font-size:13px;">Completa los campos para ver la vista previa</p>
  </div>
</div>
