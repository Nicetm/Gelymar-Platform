<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin Panel — Gelymar</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Login page -->
  <div id="login-page" class="login-page hidden"></div>

  <!-- App shell -->
  <div id="app-shell" class="hidden">
    <header class="header">
      <span class="logo">Gelymar Super Admin</span>
      <div class="flex items-center gap-8">
        <select id="env-select" onchange="App.switchEnv(this.value)" style="background:#1f2937;color:#fff;border:1px solid #374151;border-radius:4px;padding:3px 8px;font-size:12px;">
          <option value="dev">Desarrollo</option>
          <option value="prod">Producción</option>
        </select>
        <span id="env-badge" class="env-badge env-dev">DESARROLLO</span>
      </div>
      <div class="user-info">
        <span id="user-name"></span>
        <button class="btn-logout" onclick="App.logout()">Salir</button>
      </div>
    </header>

    <nav class="sidebar">
      <div class="nav-section">Módulos</div>
      <a href="#/orders">📦 Órdenes</a>
      <a href="#/orphans">🗂️ Huérfanos</a>
      <a href="#/broadcast">📢 Notificaciones</a>
      <a href="#/docker">🐳 Logs Docker</a>
      <a href="#/pm2">⏱️ Logs PM2</a>
      <a href="#/database">🗄️ Base de Datos</a>
      <div class="nav-section">Sistema</div>
      <a href="#/settings">⚙️ Configuración</a>
    </nav>

    <main class="main" id="main-content"></main>
  </div>

  <script src="js/confirm.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/orphans.js"></script>
  <script src="js/broadcast.js"></script>
  <script src="js/docker-logs.js"></script>
  <script src="js/pm2-logs.js"></script>
  <script src="js/db-browser.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
