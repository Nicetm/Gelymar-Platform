version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_ENVIRONMENT=production
    restart: unless-stopped
    networks:
      - gelymar-network

networks:
  gelymar-network:
    external: true
