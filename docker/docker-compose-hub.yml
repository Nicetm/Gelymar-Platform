name: gelymar-platform

services:
  # Capa Base de Datos
  mysql:
    image: nicetm/gelymar-platform:mysql-prod
    container_name: gelymar-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: gelymar
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - gelymar-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Capa File Server
  fileserver:
    image: nicetm/gelymar-platform:fileserver-prod
    container_name: gelymar-platform-fileserver
    restart: unless-stopped
    ports:
      - "8080:80"      # HTTP
      - "21:21"        # FTP
      - "30000-30009:30000-30009"  # FTP pasivo
    volumes:
      - fileserver_data:/var/www/html
    networks:
      - gelymar-network
    depends_on:
      mysql:
        condition: service_healthy

  # VPN Container para acceso a red compartida
  vpn:
    image: nicetm/gelymar-platform:vpn-prod
    container_name: gelymar-platform-vpn
    restart: unless-stopped
    environment:
      - TZ=America/Santiago
      - VPN_HOST=190.121.25.82
      - VPN_PORT=11444
      - VPN_USERNAME=softkey
      - VPN_PASSWORD=Z4lW00p$+h
      - VPN_TRUSTED_CERT=e137232dbb266375a29ae71401de95587812652b722c2f81b5e19fe5dc358203
    volumes:
      - vpn_config:/etc/openfortivpn
    networks:
      - gelymar-network
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1

  # Capa Backend
  backend:
    image: nicetm/gelymar-platform:backend-prod
    container_name: gelymar-platform-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=root123456
      - DB_NAME=gelymar
      - JWT_SECRET=gelymar_jwt_secret_key_2024
      - FRONTEND_BASE_URL=http://172.20.10.151:2121
      - FILE_SERVER_URL=http://fileserver:80
      - FILE_SERVER_ROOT=/var/www/html
      - SMTP_HOST=smtp.resend.com
      - SMTP_PORT=587
      - SMTP_USER=resend
      - SMTP_PASS=
      - RESEND_KEY=re_fA1mA4H1_GJrLoZvz3Up3L8W7TwpcreAg
      - NETWORK_USER=softkey
      - NETWORK_PASSWORD=sK06.2025#
      - NETWORK_SERVER=172.20.10.167
      - NETWORK_SHARE_PATH=Users/above/Documents/BotArchivoWeb/archivos
    volumes:
      - backend_logs:/app/logs
      - fileserver_data:/var/www/html
    networks:
      - gelymar-network
    privileged: true
    cap_add:
      - SYS_ADMIN
    depends_on:
      mysql:
        condition: service_healthy
      fileserver:
        condition: service_started
      vpn:
        condition: service_started

  # Capa Frontend
  frontend:
    image: nicetm/gelymar-platform:frontend-prod
    container_name: gelymar-platform-frontend
    restart: unless-stopped
    ports:
      - "2121:2121"
    environment:
      - PUBLIC_API_URL=http://172.20.10.151:3000
      - PUBLIC_FILE_SERVER_URL=http://172.20.10.151:8080
      - PUBLIC_API_BASE_URL=http://172.20.10.151:3000/api
      - PUBLIC_FRONTEND_BASE_URL=http://172.20.10.151:2121
      - PUBLIC_LANG=en
      - SITE=http://172.20.10.151:2121
      - BASE_URL=/
      - REMOTE_ASSETS_BASE_URL=/assets`n      - SERVER_API_URL=http://backend:3000
    networks:
      - gelymar-network
    depends_on:
      backend:
        condition: service_started

  # Capa Cron Jobs
  cron:
    image: nicetm/gelymar-platform:cron-prod
    container_name: gelymar-platform-cron
    restart: unless-stopped
    volumes:
      - fileserver_data:/var/www/html:rw
      - cron_logs:/app/logs
      - cron_pm2:/app/.pm2
    ports:
      - "9615:9615"
    privileged: true
    cap_add:
      - SYS_ADMIN
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=root123456
      - DB_NAME=gelymar
      - JWT_SECRET=gelymar_jwt_secret_key_2024
      - FRONTEND_BASE_URL=http://172.20.10.151:2121
      - FILE_SERVER_URL=http://fileserver:80
      - FILE_SERVER_ROOT=/var/www/html
      - SMTP_HOST=smtp.resend.com
      - SMTP_PORT=587
      - SMTP_USER=resend
      - SMTP_PASS=
      - RESEND_KEY=re_fA1mA4H1_GJrLoZvz3Up3L8W7TwpcreAg
      - NETWORK_USER=softkey
      - NETWORK_PASSWORD=sK06.2025#
      - NETWORK_SERVER=172.20.10.167
      - NETWORK_SHARE_PATH=Users/above/Documents/BotArchivoWeb/archivos
    networks:
      - gelymar-network
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
      fileserver:
        condition: service_started
      vpn:
        condition: service_started

  # Capa Monitoring Dashboard
  monitoring:
    image: nicetm/gelymar-platform:monitoring-prod
    container_name: gelymar-platform-monitoring
    restart: unless-stopped
    ports:
      - "8082:80"
    networks:
      - gelymar-network
    depends_on:
      - mysql
      - backend
      - frontend
      - fileserver
      - cron

  # Capa Terminal Web
  terminal:
    image: nicetm/gelymar-platform:terminal-prod
    container_name: gelymar-platform-terminal
    restart: unless-stopped
    ports:
      - "7681:7681"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gelymar-network
    depends_on:
      - mysql
      - backend
      - frontend
      - fileserver
      - cron
      - monitoring

  # Capa phpMyAdmin
  phpmyadmin:
    image: nicetm/gelymar-platform:phpmyadmin-prod
    container_name: gelymar-platform-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=root123456
    networks:
      - gelymar-network
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  fileserver_data:
  backend_logs:
  cron_logs:
  cron_pm2:
  vpn_config:

networks:
  gelymar-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16 
