# SSL Configuration for Apache 2.4
# Modern SSL/TLS configuration with security best practices

# SSL Configuration for Apache 2.4
# Modern SSL/TLS configuration with security best practices

# SSL Configuration
<VirtualHost *:443>
    ServerName localhost
    DocumentRoot "/usr/local/apache2/htdocs"
    
    # SSL Engine
    SSLEngine on
    
    # SSL Certificate files (you'll need to provide these)
    # SSLCertificateFile "/usr/local/apache2/conf/server.crt"
    # SSLCertificateKeyFile "/usr/local/apache2/conf/server.key"
    # SSLCertificateChainFile "/usr/local/apache2/conf/chain.crt"
    
    # Modern SSL Configuration
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder on
    SSLCompression off
    SSLSessionTickets off
    
    # Modern cipher suites
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    
    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Directory settings
    <Directory "/usr/local/apache2/htdocs">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Logging
    ErrorLog /usr/local/apache2/logs/ssl_error_log
    CustomLog /usr/local/apache2/logs/ssl_access_log combined
</VirtualHost>

# Redirect HTTP to HTTPS
<VirtualHost *:80>
    ServerName localhost
    Redirect permanent / https://localhost/
</VirtualHost> 