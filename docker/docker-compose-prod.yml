name: gelymar-platform

services:
  # Capa Base de Datos
  mysql:
    image: mysql:8.0
    container_name: gelymar-platform-mysql
    restart: unless-stopped
    environment:
      - TZ=America/Santiago
      - MYSQL_ROOT_PASSWORD=${DB_PASS:-root123456}
      - MYSQL_DATABASE=${DB_NAME:-gelymar}
    command: ["--default-time-zone=America/Santiago"]
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - gelymar-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Capa File Server
  fileserver:
    build:
      context: ./fileserver
      dockerfile: Dockerfile
    container_name: gelymar-platform-fileserver
    restart: unless-stopped
    ports:
      - "8080:80"      # HTTP
      - "21:21"        # FTP
      - "30000-30009:30000-30009"  # FTP pasivo
    environment:
      - TZ=America/Santiago
    volumes:
      - fileserver_data:/var/www/html
    networks:
      - gelymar-network
    depends_on:
      mysql:
        condition: service_healthy

  # VPN Container para acceso a red compartida
  vpn:
    image: debian:bullseye-slim
    container_name: gelymar-platform-vpn
    restart: unless-stopped
    environment:
      - TZ=America/Santiago
      - VPN_HOST=190.121.25.82
      - VPN_PORT=11444
      - VPN_USERNAME=softkey
      - VPN_PASSWORD=Z4lW00p$+h
      - VPN_TRUSTED_CERT=e137232dbb266375a29ae71401de95587812652b722c2f81b5e19fe5dc358203
    volumes:
      - vpn_config:/etc/openfortivpn
    networks:
      - gelymar-network
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    command: >
      sh -c "
        export DEBIAN_FRONTEND=noninteractive &&
        apt-get update &&
        echo 'N' | apt-get install -y openfortivpn &&
        echo 'Configurando VPN...' &&
        rm -f /etc/openfortivpn/config &&
        echo 'host = 190.121.25.82' > /etc/openfortivpn/config &&
        echo 'port = 11444' >> /etc/openfortivpn/config &&
        echo 'username = softkey' >> /etc/openfortivpn/config &&
        echo 'password = Z4lW00p$+h' >> /etc/openfortivpn/config &&
        echo 'trusted-cert = e137232dbb266375a29ae71401de95587812652b722c2f81b5e19fe5dc358203' >> /etc/openfortivpn/config &&
        echo 'pppd-use-peerdns = 1' >> /etc/openfortivpn/config &&
        echo 'pppd-log = /var/log/pppd.log' >> /etc/openfortivpn/config &&
        echo 'Configuración VPN:' &&
        cat /etc/openfortivpn/config &&
        echo 'Iniciando conexión VPN...' &&
        openfortivpn -c /etc/openfortivpn/config -v &
        VPN_PID=$$! &&
        echo 'Esperando conexión VPN...' &&
        sleep 15 &&
        echo 'VPN conectada. Manteniendo conexión...' &&
        trap 'echo \"Recibida señal de terminación, cerrando VPN...\"; kill $$VPN_PID 2>/dev/null; exit 0' TERM INT &&
        tail -f /dev/null
      "

  # Capa Backend
  backend:
    build:
      context: ../Backend
      dockerfile: Dockerfile
    container_name: gelymar-platform-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=America/Santiago
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - DOCKER_ENV=true
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-root123456}
      - DB_NAME=${DB_NAME:-gelymar}
      - JWT_SECRET=${JWT_SECRET:-gelymar_jwt_secret_key_2024}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://172.20.10.151:2121}
      - BACKEND_BASE_URL=${BACKEND_BASE_URL:-http://172.20.10.151:3000}
      - FILE_SERVER_URL=${FILE_SERVER_URL:-http://fileserver:80}
      - FILE_SERVER_ROOT=${FILE_SERVER_ROOT:-/var/www/html}
      - SMTP_HOST=${SMTP_HOST:-smtp.office365.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-logistics@gelymar.com}
      - SMTP_PASS=${SMTP_PASS}
      - RESEND_KEY=${RESEND_KEY}
      - NETWORK_USER=${NETWORK_USER:-softkey}
      - NETWORK_PASSWORD=${NETWORK_PASSWORD:-sK06.2025#}
      - NETWORK_SERVER=${NETWORK_SERVER:-172.20.10.167}
      - NETWORK_SHARE_PATH=${NETWORK_SHARE_PATH:-Users/above/Documents/BotArchivoWeb/archivos}
    volumes:
      - backend_logs:/app/logs
      - fileserver_data:/var/www/html
    networks:
      - gelymar-network
    privileged: true
    cap_add:
      - SYS_ADMIN
    depends_on:
      mysql:
        condition: service_healthy
      fileserver:
        condition: service_started
      vpn:
        condition: service_started

  # Capa Frontend
  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=${NODE_ENV:-production}
        - PUBLIC_API_URL=${PUBLIC_API_URL:-http://172.20.10.151:3000}
        - PUBLIC_FILE_SERVER_URL=${PUBLIC_FILE_SERVER_URL:-http://172.20.10.151:8080}
        - SERVER_API_URL=${SERVER_API_URL:-http://backend:3000}
    container_name: gelymar-platform-frontend
    restart: unless-stopped
    ports:
      - "2121:2121"
    environment:
      - TZ=America/Santiago
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://172.20.10.151:3000}
      - PUBLIC_FILE_SERVER_URL=${PUBLIC_FILE_SERVER_URL:-http://172.20.10.151:8080}
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://172.20.10.151:3000/api}
      - PUBLIC_FRONTEND_BASE_URL=${PUBLIC_FRONTEND_BASE_URL:-http://172.20.10.151:2121}
      - PUBLIC_LANG=${PUBLIC_LANG:-en}
      - SITE=${SITE:-http://172.20.10.151:2121}
      - BASE_URL=${BASE_URL:-/}
      - REMOTE_ASSETS_BASE_URL=${REMOTE_ASSETS_BASE_URL:-/assets}
      - SERVER_API_URL=${SERVER_API_URL:-http://backend:3000}
      - CI=${CI:-false}
    networks:
      - gelymar-network
    depends_on:
      - backend

  # Capa Cron (Separada)
  cron:
    build:
      context: ..
      dockerfile: docker/cron/Dockerfile
    container_name: gelymar-platform-cron
    restart: unless-stopped
    environment:
      - TZ=America/Santiago
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-root123456}
      - DB_NAME=${DB_NAME:-gelymar}
      - FILE_SERVER_ROOT=${FILE_SERVER_ROOT:-/var/www/html}
      - FILE_SERVER_URL=${FILE_SERVER_URL:-http://fileserver:80}
      - BACKEND_API_URL=${BACKEND_API_URL:-http://backend:3000}
      - NETWORK_SERVER=${NETWORK_SERVER:-172.20.10.167}
      - NETWORK_SHARE_PATH=${NETWORK_SHARE_PATH:-Users/above/Documents/BotArchivoWeb/archivos}
      - NETWORK_USER=${NETWORK_USER:-softkey}
      - NETWORK_PASSWORD=${NETWORK_PASSWORD}
      - PM2_HOME=/app/.pm2
    volumes:
      - fileserver_data:/var/www/html:rw
      - cron_logs:/app/logs
      - cron_pm2:/app/.pm2
    networks:
      - gelymar-network
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
      fileserver:
        condition: service_started
      vpn:
        condition: service_started
    ports:
      - "9615:9615"  # PM2 web interface
    privileged: true  # Dar privilegios para montar redes
    cap_add:
      - SYS_ADMIN  # Capacidad para montar sistemas de archivos

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: gelymar-platform-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - TZ=America/Santiago
      - PMA_HOST=${DB_HOST:-mysql}
      - PMA_PORT=${DB_PORT:-3306}
      - PMA_USER=${DB_USER:-root}
      - PMA_PASSWORD=${DB_PASS:-root123456}
    networks:
      - gelymar-network
    depends_on:
      mysql:
        condition: service_healthy

  # Dashboard de Monitoreo
  monitoring:
    build:
      context: .
      dockerfile: Dockerfile.monitoring
    container_name: gelymar-platform-monitoring
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - TZ=America/Santiago
    networks:
      - gelymar-network
    depends_on:
      - mysql
      - backend
      - frontend
      - fileserver
      - cron
      - phpmyadmin

  # Terminal Real
  terminal:
    build:
      context: .
      dockerfile: Dockerfile.terminal
    container_name: gelymar-platform-terminal
    restart: unless-stopped
    ports:
      - "7681:7681"
    environment:
      - TZ=America/Santiago
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-root123456}
      - DB_NAME=${DB_NAME:-gelymar}
      - TERMINAL_USER=${TERMINAL_USER:-admin}
      - TERMINAL_PASS=${TERMINAL_PASS:-admin123}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gelymar-network
    depends_on:
      - mysql
      - backend
      - frontend
      - fileserver
      - cron
      - phpmyadmin

volumes:
  mysql_data:
    driver: local
  fileserver_data:
    driver: local
  backend_logs:
    driver: local
  cron_logs:
    driver: local
  cron_pm2:
    driver: local
  vpn_config:
    driver: local

networks:
  gelymar-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16 
